<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Render SQL Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { background-color: #0f0f0f; color: #f97316; }
        .orange-accent { color: #f97316; }
        textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .result-table th, .result-table td { border-color: #3f3f3f; }
        .status-success { color: #22c55e; }
        .status-error { color: #ef4444; }
        .history-item {
            transition: background-color 0.1s ease;
        }
        .history-item:hover {
            background-color: #27251f;
        }
    </style>
</head>
<body class="bg-zinc-950 text-orange-500">
<div class="max-w-5xl mx-auto p-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">Render Postgres SQL Tool</h1>
            <p class="text-zinc-400 text-sm mt-1">Lightweight • Dark Mode • Orange</p>
        </div>
        <div class="text-xs px-3 py-1 bg-zinc-900 border border-zinc-700 rounded-full">v1</div>
    </div>

    <!-- Input Form -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl">
        <form id="sql-form" hx-post="/execute" 
              hx-target="#message" 
              hx-swap="innerHTML"
              class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-orange-400">Native SQL Query</label>
                <textarea id="sql-input" name="sql" rows="8" required
                          class="w-full bg-zinc-950 border border-zinc-700 text-orange-400 font-mono text-sm p-4 rounded-xl focus:outline-none focus:border-orange-500 placeholder-zinc-500"
                          placeholder="SELECT * FROM your_table LIMIT 20;"></textarea>
            </div>

            <button type="submit"
                    class="w-full bg-orange-600 hover:bg-orange-700 active:bg-orange-800 transition-all text-white font-semibold py-3.5 rounded-xl text-lg shadow-lg">
                Execute Query
            </button>
        </form>
    </div>

    <!-- Query History -->
    <div class="mt-6 bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
        <div class="flex items-center justify-between mb-3 px-1">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-orange-400">Recent Queries</span>
                <span id="history-count" 
                      class="text-xs px-2 py-0.5 bg-zinc-800 text-zinc-400 rounded-full">0</span>
            </div>
            <button onclick="clearHistory()"
                    class="text-xs text-zinc-400 hover:text-red-400 transition-colors">
                Clear all
            </button>
        </div>

        <div id="history-list" 
             class="max-h-[320px] overflow-y-auto pr-1 space-y-1 text-sm">
            <!-- Populated by JavaScript -->
        </div>
        <div id="history-empty" class="px-1 py-4 text-center text-zinc-500 text-xs">
            No queries yet. Execute a query to see it here.
        </div>
    </div>

    <!-- Status / Error Message Area -->
    <div id="message" class="mt-6"></div>

    <!-- Persistent Results Area -->
    <div id="results" class="mt-8">
        <div class="text-zinc-500 text-sm italic px-1">Results from your last successful query will appear here.</div>
    </div>
</div>

<!-- Results Fragment -->
<div th:fragment="results" th:if="${result != null}">
    <!-- Success Banner -->
    <div th:if="${result.success()}" 
         class="bg-zinc-900 border border-zinc-700 rounded-2xl p-5 mb-6">
        <div class="flex items-center gap-3">
            <div class="status-success text-2xl">✓</div>
            <div class="flex-1">
                <span class="font-semibold text-lg" th:text="${result.message()}"></span>
                <span class="text-zinc-400 ml-2" th:text="'(' + ${result.affectedRows()} + ' rows affected)' "></span>
            </div>
            <div class="text-xs px-3 py-1 bg-zinc-800 text-zinc-400 rounded-full">Success</div>
        </div>
    </div>

    <!-- Error Banner -->
    <div th:if="${!result.success()}" 
         class="bg-red-950 border border-red-900 rounded-2xl p-5 mb-6">
        <div class="flex items-start gap-3">
            <div class="text-red-500 text-2xl mt-0.5">✕</div>
            <div class="flex-1">
                <div class="font-semibold text-red-400">Error executing query</div>
                <div class="text-red-300 mt-1 text-sm font-mono break-all" th:text="${result.message()}"></div>
            </div>
            <div class="text-xs px-3 py-1 bg-red-900 text-red-400 rounded-full">Error</div>
        </div>
    </div>

    <!-- Out-of-band results update -->
    <div th:if="${result.success() and result.rows() != null and !result.rows().isEmpty()}" 
         id="results" hx-swap-oob="true">
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
            <div class="overflow-auto max-h-[600px] border border-zinc-700 rounded-xl">
                <table class="result-table w-full text-sm">
                    <thead class="bg-zinc-950 sticky top-0">
                        <tr>
                            <th th:each="col : ${result.rows()[0].keySet()}" 
                                class="px-4 py-3 text-left font-medium text-orange-400 border-b border-zinc-700" 
                                th:text="${col}"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${result.rows()}" class="border-b border-zinc-800 hover:bg-zinc-950">
                            <td th:each="entry : ${row}" 
                                class="px-4 py-3 font-mono text-xs text-zinc-300" 
                                th:text="${entry.value} ?: ''"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${result.success() and (result.rows() == null or result.rows().isEmpty())}" 
         id="results" hx-swap-oob="true">
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6 text-zinc-400 text-sm">
            Query executed successfully but returned no rows.
        </div>
    </div>
</div>

<script>
    // === Query History with localStorage ===
    const HISTORY_KEY = 'sql_tool_history';
    const MAX_HISTORY = 15;

    function getHistory() {
        try {
            const data = localStorage.getItem(HISTORY_KEY);
            return data ? JSON.parse(data) : [];
        } catch (e) {
            return [];
        }
    }

    function saveHistory(history) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function addToHistory(sql) {
        if (!sql || sql.trim().length === 0) return;

        let history = getHistory();

        // Remove duplicate if same query was just run
        history = history.filter(item => item.sql !== sql);

        // Add new entry at the beginning
        history.unshift({
            sql: sql,
            timestamp: new Date().toISOString()
        });

        if (history.length > MAX_HISTORY) {
            history = history.slice(0, MAX_HISTORY);
        }

        saveHistory(history);
        renderHistory();
    }

    function formatTimeAgo(isoString) {
        const date = new Date(isoString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);

        if (diffMins < 1) return 'just now';
        if (diffMins < 60) return diffMins + 'm ago';
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 24) return diffHours + 'h ago';
        return date.toLocaleDateString();
    }

    function truncateQuery(query, maxLength = 95) {
        if (query.length <= maxLength) return query;
        return query.substring(0, maxLength) + '...';
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        const emptyState = document.getElementById('history-empty');
        const countBadge = document.getElementById('history-count');
        const history = getHistory();

        container.innerHTML = '';

        if (history.length === 0) {
            emptyState.style.display = 'block';
            countBadge.textContent = '0';
            return;
        }

        emptyState.style.display = 'none';
        countBadge.textContent = history.length;

        history.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'history-item flex items-center justify-between gap-3 px-3 py-2.5 rounded-xl border border-zinc-800 hover:border-zinc-700';

            // Use data-sql attribute to avoid JS injection issues with quotes etc.
            div.innerHTML = `
                <div class="flex-1 min-w-0 cursor-pointer run-btn" data-sql="${escapeHtml(item.sql)}">
                    <div class="font-mono text-xs text-orange-300 truncate">${truncateQuery(item.sql)}</div>
                    <div class="text-[10px] text-zinc-500 mt-0.5">${formatTimeAgo(item.timestamp)}</div>
                </div>
                <div class="flex items-center gap-1.5 flex-shrink-0">
                    <button class="run-btn px-3 py-1 text-xs bg-orange-600 hover:bg-orange-700 text-white rounded-lg transition-colors" 
                            data-sql="${escapeHtml(item.sql)}">
                        Run
                    </button>
                    <button class="copy-btn px-3 py-1 text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-lg transition-colors" 
                            data-sql="${escapeHtml(item.sql)}">
                        Copy
                    </button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&')
            .replace(/</g, '<')
            .replace(/>/g, '>')
            .replace(/"/g, '"')
            .replace(/'/g, '&#039;');
    }

    // Event delegation for Run and Copy buttons
    document.getElementById('history-list').addEventListener('click', function(e) {
        const runBtn = e.target.closest('.run-btn');
        const copyBtn = e.target.closest('.copy-btn');

        if (runBtn) {
            const sql = runBtn.getAttribute('data-sql');
            if (sql) runFromHistory(sql);
        }

        if (copyBtn) {
            const sql = copyBtn.getAttribute('data-sql');
            if (sql) copyFromHistory(sql);
        }
    });

    function runFromHistory(sql) {
        const textarea = document.getElementById('sql-input');
        textarea.value = sql;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        setTimeout(() => {
            document.getElementById('sql-form').requestSubmit();
        }, 120);
    }

    function copyFromHistory(sql) {
        navigator.clipboard.writeText(sql).then(() => {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-zinc-800 text-orange-400 text-xs px-4 py-2 rounded-xl border border-zinc-700 z-50';
            toast.textContent = 'Copied to clipboard';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.2s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 150);
            }, 1100);
        }).catch(() => {
            // Fallback for older browsers
            const input = prompt('Copy this query:', sql);
        });
    }

    function clearHistory() {
        if (confirm('Clear all query history?')) {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        }
    }

    // Auto-save successful queries to history
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'message') {
            const successBanner = document.querySelector('#message .status-success');
            if (successBanner) {
                const textarea = document.getElementById('sql-input');
                if (textarea && textarea.value.trim()) {
                    addToHistory(textarea.value.trim());
                }
            }
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        renderHistory();
    });
</script>

</body>
</html>
