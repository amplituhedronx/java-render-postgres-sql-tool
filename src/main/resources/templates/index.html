<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Render SQL Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { background-color: #0f0f0f; color: #f97316; }
        textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .result-table th, .result-table td { border-color: #3f3f3f; }
        .query-block {
            scroll-margin-top: 20px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-orange-500">
<div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between px-8 pt-8 pb-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Render Postgres SQL Tool</h1>
            <p class="text-zinc-400 text-sm">Lightweight • Dark Mode • Orange</p>
        </div>
        <div class="text-xs px-3 py-1 bg-zinc-900 border border-zinc-700 rounded-full">v2</div>
    </div>

    <!-- Scrollable Query History -->
    <div id="query-log" 
         class="h-[calc(100vh-280px)] overflow-y-auto px-8 pb-6 space-y-6">
        
        <!-- Query blocks will be prepended here by HTMX -->
        <div class="flex flex-col items-center justify-center h-full text-center text-zinc-500">
            <div class="text-4xl mb-3">📝</div>
            <p class="text-sm">Your query history will appear here.<br>Execute a query below to get started.</p>
        </div>
    </div>

    <!-- Fixed Input Form at Bottom -->
    <div class="sticky bottom-0 bg-zinc-950 border-t border-zinc-800 px-8 py-5">
        <div class="max-w-5xl mx-auto">
            <form hx-post="/execute" 
                  hx-target="#query-log" 
                  hx-swap="afterbegin"
                  class="space-y-3">
                
                <div>
                    <textarea name="sql" rows="5" required
                              class="w-full bg-zinc-900 border border-zinc-700 text-orange-400 font-mono text-sm p-4 rounded-2xl focus:outline-none focus:border-orange-500 placeholder-zinc-500"
                              placeholder="SELECT * FROM your_table LIMIT 20;"></textarea>
                </div>

                <div class="flex justify-end">
                    <button type="submit"
                            class="bg-orange-600 hover:bg-orange-700 active:bg-orange-800 transition-all text-white font-semibold px-8 py-2.5 rounded-2xl text-sm shadow-lg">
                        Execute Query
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Single Query + Result Block Fragment -->
<div th:fragment="query-block" th:if="${result != null}" class="query-block">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden">
        
        <!-- Query Header -->
        <div class="px-5 py-3 bg-zinc-950 border-b border-zinc-800 flex items-center justify-between">
            <div class="flex items-center gap-3 min-w-0">
                <span class="text-xs px-2.5 py-0.5 bg-zinc-800 text-zinc-400 rounded-full font-mono">SQL</span>
                <span class="font-mono text-sm text-orange-300 truncate max-w-[70ch]" 
                      th:text="${sql}"></span>
            </div>
            <button type="button" 
                    onclick="rerunQuery(this)"
                    class="text-xs px-3 py-1 bg-orange-600 hover:bg-orange-700 text-white rounded-xl transition-colors flex-shrink-0">
                Run again
            </button>
        </div>

        <!-- Result Content -->
        <div class="p-5">
            <!-- Success -->
            <div th:if="${result.success()}">
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-green-400 text-lg">✓</span>
                    <span class="font-medium" th:text="${result.message()}"></span>
                    <span class="text-xs text-zinc-400" th:text="'(' + ${result.affectedRows()} + ' rows)' "></span>
                </div>

                <div th:if="${result.rows() != null and !result.rows().isEmpty()}" 
                     class="overflow-auto max-h-[420px] border border-zinc-700 rounded-2xl">
                    <table class="result-table w-full text-sm">
                        <thead class="bg-zinc-950 sticky top-0">
                            <tr>
                                <th th:each="col : ${result.rows()[0].keySet()}" 
                                    class="px-4 py-2.5 text-left font-medium text-orange-400 border-b border-zinc-700 text-xs" 
                                    th:text="${col}"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="row : ${result.rows()}" class="border-b border-zinc-800 hover:bg-zinc-950">
                                <td th:each="entry : ${row}" 
                                    class="px-4 py-2.5 font-mono text-xs text-zinc-300" 
                                    th:text="${entry.value} ?: ''"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${result.rows() == null or result.rows().isEmpty()}" 
                     class="text-zinc-400 text-sm py-2">
                    No rows returned.
                </div>
            </div>

            <!-- Error -->
            <div th:if="${!result.success()}" class="bg-red-950/60 border border-red-900 rounded-2xl p-4">
                <div class="flex items-start gap-3">
                    <span class="text-red-500 text-xl mt-0.5">✕</span>
                    <div class="flex-1">
                        <div class="font-semibold text-red-400 text-sm">Error</div>
                        <div class="text-red-300 mt-1 text-xs font-mono break-all" th:text="${result.message()}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Re-run a query from history
    function rerunQuery(button) {
        const block = button.closest('.query-block');
        const sqlText = block.querySelector('.font-mono.text-sm').textContent.trim();
        
        const textarea = document.querySelector('textarea[name="sql"]');
        textarea.value = sqlText;
        
        // Scroll to input
        textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        textarea.focus();
    }

    // Auto-scroll to the newest block after HTMX swap
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'query-log') {
            const firstBlock = evt.detail.target.firstElementChild;
            if (firstBlock) {
                setTimeout(() => {
                    firstBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 80);
            }
        }
    });

    // Keyboard shortcut: Ctrl/Cmd + Enter to execute
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            const form = document.querySelector('form');
            if (form) form.requestSubmit();
        }
    });
</script>

</body>
</html>
